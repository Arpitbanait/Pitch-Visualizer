<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storyboard | Pitch Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #101d2f;
      --steel: #1e3a5f;
      --sky: #d9e8ff;
      --cream: #fff9ef;
      --orange: #ff7f50;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 5% 5%, rgba(255, 127, 80, 0.17), transparent 35%),
        radial-gradient(circle at 95% 10%, rgba(30, 58, 95, 0.16), transparent 36%),
        linear-gradient(145deg, var(--cream), #f7fbff 58%, var(--sky));
      min-height: 100vh;
    }

    .title-font {
      font-family: "Playfair Display", serif;
    }

    .panel {
      animation: panelIn 560ms ease both;
    }

    .panel:nth-child(2) { animation-delay: 80ms; }
    .panel:nth-child(3) { animation-delay: 140ms; }
    .panel:nth-child(4) { animation-delay: 200ms; }
    .panel:nth-child(5) { animation-delay: 260ms; }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body class="px-4 py-10 md:px-6 md:py-12">
  <main class="mx-auto max-w-7xl">
    <header class="mb-8 flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="mb-2 text-xs font-semibold uppercase tracking-[0.2em] text-slate-700">AI Storyboard Output</p>
        <h1 class="title-font text-4xl font-bold text-slate-900 md:text-5xl">Your Visual Storyboard</h1>
      </div>
      <a
        href="/"
        class="rounded-lg border border-slate-900/20 bg-white/80 px-4 py-2 text-sm font-semibold uppercase tracking-wide text-slate-800 transition hover:bg-white"
      >
        Create Another
      </a>
    </header>

    {% if warning %}
    <div class="mb-7 rounded-xl border border-amber-300 bg-amber-50 px-4 py-3 text-sm font-medium text-amber-800">
      {{ warning }}
    </div>
    {% endif %}

    <section class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">
      {% for scene in scenes %}
      <article class="panel overflow-hidden rounded-2xl border border-white/70 bg-white/80 shadow-xl backdrop-blur-sm">
        <img
          src="{{ scene.image_url }}"
          data-fallback="{{ scene.backup_image_url }}"
          alt="Scene {{ loop.index }}"
          class="h-56 w-full object-cover md:h-60"
          loading="lazy"
          referrerpolicy="no-referrer"
          onerror="if (!this.dataset.retried) { this.dataset.retried = '1'; this.src = this.dataset.fallback; } else { this.src='https://placehold.co/800x500/e2e8f0/334155?text=Image+Unavailable'; }"
        />
        <div class="space-y-2 p-4 md:p-5">
          <h2 class="text-sm font-bold uppercase tracking-[0.14em] text-slate-700">Scene {{ loop.index }}</h2>
          <p class="text-[15px] leading-relaxed text-slate-900">{{ scene.caption }}</p>
        </div>
      </article>
      {% endfor %}
    </section>

    <details class="mt-8 rounded-xl border border-slate-200 bg-white/80 p-4">
      <summary class="cursor-pointer text-sm font-semibold text-slate-800">Source text</summary>
      <p class="mt-3 whitespace-pre-wrap text-sm leading-relaxed text-slate-700">{{ source_text }}</p>
    </details>
  </main>
</body>
</html>
